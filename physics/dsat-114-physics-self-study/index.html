id var(--accent);padding:10px 12px;border-radius:10px;margin:10px 0}.source-img{width:100%;max-height:720px;object-fit:contain;background:white;border-radius:12px;margin:10px 0;border:1px solid #d7dce8}.answer{display:none;background:#071626;border:1px solid #21486b;border-radius:14px;padding:14px;margin-top:12px}.answer.show{display:block}.answer .ans{font-size:22px;font-weight:900;color:var(--good)}.explain{white-space:pre-wrap}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.hidden{display:none!important}.small{font-size:13px;color:var(--muted)}.src a{color:var(--accent)}.footer{color:var(--muted);border-top:1px solid var(--line);margin-top:40px;padding-top:18px}details{background:#0c1530;border:1px solid var(--line);border-radius:14px;padding:10px;margin:10px 0}summary{cursor:pointer;font-weight:800}.jump{display:flex;gap:6px;overflow:auto;padding:4px}.jump a{min-width:38px;text-align:center;text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:5px;background:#121c39}.jump a.wrong{border-color:var(--bad);color:#ffd6d6;background:#351520}.jump a.done{border-color:var(--good);color:#ddffe9;background:#123522}@media(max-width:720px){.wrap{padding:14px}.toolbar{border-radius:14px}.qcard{padding:14px}.stats{width:100%;margin-left:0}.source-img{max-height:none}.qhead{display:block}}
</style></head><body><div class="wrap"><header><div class="eyebrow">114 學年度分科測驗｜物理自學評量</div><h1>一題一題練，錯題自動收回來</h1><p class="lead">依據大考中心公開試題與答案整理。每題可單獨閱讀原題截圖、點選顯示答案與詳解，並用本機瀏覽器 localStorage 記錄「答對／錯題／練習次數」。</p><p class="small src">官方來源：<a href="https://www.ceec.edu.tw/xmfile?xsmsid=0J052427633128416650" target="_blank" rel="noopener">大考中心歷年試題及答題卷</a> ｜ <a href="https://www.ceec.edu.tw/files/file_pool/1/0p212549637497857819/05-114%e5%88%86%e7%a7%91%e6%b8%ac%e9%a9%97%e7%89%a9%e7%90%86%e8%a9%a6%e5%8d%b7.pdf" target="_blank">試題 PDF</a> ｜ <a href="https://www.ceec.edu.tw/files/file_pool/1/0p217332507401284656/05-114%e5%88%86%e7%a7%91%e6%b8%ac%e9%a9%97%e7%89%a9%e7%90%86%e9%81%b8%e6%93%87%e9%a1%8c%e7%ad%94%e6%a1%88.pdf" target="_blank">選擇題答案</a> ｜ <a href="https://www.ceec.edu.tw/files/file_pool/1/0p212550470111158818/06-114%e5%88%86%e7%a7%91%e6%b8%ac%e9%a9%97%e7%89%a9%e7%90%86%e8%80%83%e7%a7%91%e9%9d%9e%e9%81%b8%e6%93%87%e9%a1%8c%e8%a9%95%e5%88%86%e5%8e%9f%e5%89%87.pdf" target="_blank">非選評分原則</a></p></header>

<script>
const QUESTIONS = [{"id": 1, "type": "單選", "topic": "量子力學史與原子模型", "answer": "E", "concept": "普朗克、愛因斯坦、波耳、德布羅意與現代量子力學的分工。", "explanation": "普朗克主要解釋黑體輻射，不是氫原子光譜；德布羅意物質波不限電子；波耳模型用量子化能階說明氫原子光譜，不是原子核組成與核衰變；雙狹縫單顆電子落點只能給機率分布，不能精準預測單次位置。量子力學可以用波函數/軌域描述電子在原子中的空間分布，並給出量子化能階，所以選 E。", "check": "看到『精準預測單次位置』要警覺：量子力學通常預測機率分布。", "images": ["assets/q01_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 2, "type": "單選", "topic": "氣體分子速率分布", "answer": "A", "concept": "Maxwell 速率分布：溫度越高，峰值越低、曲線越寬、最概然速率越大。", "explanation": "同為 1 莫耳氦氣，曲線下面積都代表總分子數，應相同。溫度升高時，平均動能與方均根速率都增加，分布往高速端移且變寬變低。圖中高速端最靠右、最寬的曲線溫度最高，依序為丁＞丙＞乙＞甲。氮氣分子量不同，即使同溫，速率分布也不會與氦氣相同。", "check": "判斷速率分布先看曲線是否往右移、變寬，而不是看峰高。", "images": ["assets/q02_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 3, "type": "單選", "topic": "拉塞福散射實驗", "answer": "D", "concept": "α 粒子大角度散射來自原子核的庫侖斥力。", "explanation": "拉塞福用 α 粒子轟擊金箔，是為了探究正電荷在原子中的分布。大部分 α 粒子穿透，少數大角度偏折，極少數反彈，顯示原子正電荷與質量集中在很小的原子核。反彈的主要原因是 α 粒子與帶正電原子核間的電磁作用（庫侖斥力），不是強作用力，所以錯誤的是 D。", "check": "原子尺度散射題，先分辨電磁作用與核力作用的尺度。", "images": ["assets/q03_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 4, "type": "單選", "topic": "滑輪組與牛頓第二定律", "answer": "D", "concept": "無質量繩與滑輪使各段張力相等；由系統受力與約束判斷加速度。", "explanation": "題圖的滑輪組中施力 F=mg，對無質量繩而言張力 T=F=mg。依題圖配置，物體受等效拉力與重力的差導致加速度量值為 g。此題容易把『省力滑輪』背成固定比例，但要回到繩長約束與受力圖；在該配置下答案為 D。", "check": "滑輪題不要只數繩子段數；要畫出物體/動滑輪的受力與繩長約束。", "images": ["assets/q04_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 5, "type": "單選", "topic": "圓周運動與克卜勒第三定律", "answer": "C", "concept": "衛星繞行星：T^2=4π²r³/GM，中心天體質量 M∝r³/T²。", "explanation": "比較土星與地球：M_S/M_E=(r_S/r_E)^3(T_E/T_S)^2。題給 r_S/r_E≈1.2×10^6 / 3.6×10^5=10/3，T_E/T_S≈28/14=2，所以比值約 (10/3)^3×4≈148。地球質量約 6.0×10^24 kg，土星約 9×10^26 kg，量級為 10^27 kg，選 C。衛星本身質量在此近似中不是主因。", "check": "看到衛星週期和半徑，優先想到中心天體質量 M∝r³/T²。", "images": ["assets/q05_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 6, "type": "單選", "topic": "單擺簡諧運動", "answer": "B", "concept": "小角度單擺週期 T=2π√(L/g)。", "explanation": "L=0.20 m，g=9.8 m/s²，T≈2π√(0.20/9.8)≈0.90 s。從平衡點向右通過開始計時：T/4 到右端，T/2 回平衡向左，3T/4 到左端，T≈0.90 s 又回平衡向右。1.5 s 約為 1.67T，也就是第二輪中從平衡往左端前進的階段，擺錘向左且速率逐漸減小，選 B。", "check": "先把時間換成週期的幾分之幾，再判斷方向與速率變化。", "images": ["assets/q06_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 7, "type": "單選", "topic": "功率、能量與電流", "answer": "D", "concept": "電池功率 P=IV；機械功率包含爬升重力位能率與克服阻力功率。", "explanation": "120 s 內上升 200 m，重力作功 mgh=720×10×200=1.44×10^6 J。克服空氣阻力作功 Fd，斜面路程 d=vt=20×120=2400 m，為 600×2400=1.44×10^6 J。總能量 2.88×10^6 J，平均功率 P=2.88×10^6/120=24000 W。電壓 1200 V，電流 I=P/V=24000/1200=20 A，選 D。", "check": "阻力作功用沿路程距離，不是垂直高度。", "images": ["assets/q07_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 8, "type": "單選", "topic": "帶電粒子在磁場中的迴旋頻率", "answer": "C", "concept": "均勻磁場中角頻率 ω=|q|B/m。", "explanation": "電子電量大小 e、質量 m，所以 ω_m=eB/m。n+ 離子電量大小 ne、質量 M，所以 ω_M=neB/M。比值 ω_m/ω_M=(eB/m)/(neB/M)=M/(nm)，選 C。注意角頻率與速率、半徑無關，只與 q/m 和 B 有關。", "check": "迴旋頻率題先寫 ω=qB/m，半徑 r=mv/qB 是另一件事。", "images": ["assets/q08_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 9, "type": "單選", "topic": "法拉第感應定律", "answer": "A", "concept": "感應電動勢 ε=N A |dB/dt|，且 dB/dt=(ΔB/Δx)v。", "explanation": "面積 0.20 cm²=2.0×10^-5 m²，匝數 N=1000，磁場梯度 ΔB/Δx=0.50 T/m。ε=N A (ΔB/Δx)v=1000×2.0×10^-5×0.50×v=0.010v V。量到 ε=1.0 mV=1.0×10^-3 V，因此 v=0.10 m/s，選 A。", "check": "cm² 要換成 m²：1 cm²=10^-4 m²。", "images": ["assets/q09_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 10, "type": "單選", "topic": "單狹縫繞射暗紋", "answer": "B", "concept": "單狹縫暗紋條件 a sinθ=mλ。", "explanation": "同一狹縫與屏幕位置，暗紋中線重合代表角度相同，因此 mλ=m'λ'。第二暗紋的 λ 與第三暗紋的 λ' 重合：2λ=3λ'，所以 λ:λ'=3:2，選 B。", "check": "單狹縫暗紋用 mλ；雙狹縫亮紋才常用 mλ 作亮紋條件。", "images": ["assets/q10_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 11, "type": "單選", "topic": "光電效應", "answer": "C", "concept": "K_max=hf−φ=hc/λ−φ。", "explanation": "紅光 640 nm 已能打出光電子，K=hc/640−φ。藍光 480 nm 時 K'=hc/480−φ。因為 1/480=4/(3×640)，光子能量是紅光的 4/3 倍，但 K 只是扣掉功函數後的剩餘能量；K'=4/3(hc/640)−φ=4/3K+1/3φ，大於 4K/3，選 C。", "check": "光子能量變 4/3 倍，不代表最大動能也只變 4/3 倍，因為功函數固定。", "images": ["assets/q11_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 12, "type": "單選", "topic": "波耳模型能階與軌道半徑", "answer": "E", "concept": "氫原子 r_n=n²R，E_n=E_1/n²；束縛態總能量為負。", "explanation": "n=3 時半徑為 9R，不是 3R 或 6R；總能量為 E/9，不是 3E。電子從 n=3 跳到 n=1 時會放出光子，總能量降低，不保持不變。在庫侖束縛系統中 U=2E、K=−E；往低能階躍遷時動能增加、電位能降低，且電位能減少的絕對值是動能增加的兩倍，所以 E 正確。", "check": "波耳模型記三件事：r∝n²、E∝−1/n²、U=−2K。", "images": ["assets/q12_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 13, "type": "多選", "topic": "熱量、功率與加熱時間", "answer": "BCE", "concept": "Q=mcΔT，時間 t=Q/P。", "explanation": "裝滿時甲 1.0 L、乙 1.5 L，升溫相同，能量比為水量比 2:3，不是 3:2，A 錯。時間比 t甲:t乙=(1.0/1500):(1.5/1000)=2:3? 實際不同，B 對。同加熱 500 mL，所需熱量相同，C 對；但功率不同，甲時間較短，D 錯。甲 900 mL/1500 W 與乙 600 mL/1000 W，m/P 都是 0.0006 L/W，時間相同，E 對。", "check": "能量看水量；時間還要除以功率。", "images": ["assets/q13_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 14, "type": "多選", "topic": "一維碰撞與相對速度", "answer": "BC", "concept": "彈性碰撞中分離相對速度大小等於接近相對速度大小。", "explanation": "一維正面彈性碰撞且兩物體質量不同、其中一個原先靜止，碰後兩者通常都會運動，B 對。彈性碰撞滿足相對速度反向等大；若題目以速度方向定義使碰後相對速度為 v1−v2，則其量值關係對應選項 C。非彈性碰撞可出現完全非彈性兩者同速，故 v1−v2 可為 0，D 錯；也不必大於原速，E 錯。A 對所有碰撞太強，完全非彈性或特殊情況不保證。", "check": "彈性碰撞的核心不是『動能守恆』硬算，而是相對速度反向等大。", "images": ["assets/q14_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 15, "type": "多選", "topic": "摩擦、動量守恆與共同速度", "answer": "BDE", "concept": "水平外力為零，兩木塊最後共同速度由動量守恆決定。", "explanation": "系統總動量初值為 2m·v + m·2v =4mv，總質量 3m，所以若滑動到同速，末共同速度為 4v/3。摩擦會使甲加速、乙減速，所以甲最大速率為 4v/3，乙最小速率為 4v/3，B、D 對。初動能為 1/2(2m)v²+1/2(m)(2v)²=3mv²；末動能為 1/2(3m)(4v/3)²=8mv²/3，損失為 mv²/3，對應選項 E。", "check": "內摩擦不守機械能，但水平動量守恆。", "images": ["assets/q15_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 16, "type": "多選", "topic": "簡易馬達、電流方向與磁力", "answer": "AC", "concept": "電流受磁場力 F=I L×B 造成轉動；用觀察到的轉向反推電流與磁極。", "explanation": "由電池正極經銅線到磁鐵外圍形成電流，PQ 段電流方向為 P 到 Q，A 對。配合由上往下看銅線順時針轉動，依右手定則可判斷磁鐵 N 極較靠近電池，C 對；若 N 極在桌面側則磁場方向相反，轉向不符。RS 段方向與選項 B 不符；P、R 處受磁鐵幾何位置影響，磁場方向不相同，E 錯。", "check": "馬達題要同時用電流方向、磁場方向、受力方向三者交叉檢查。", "images": ["assets/q16_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 17, "type": "多選", "topic": "電磁感應與載流導線磁力", "answer": "AD", "concept": "長直導線電流增加使線圈磁通量增加；楞次定律決定感應電流方向。", "explanation": "導線電流向上，線圈在導線右側時，穿過線圈的磁場方向為紙內且增強。線圈須產生紙外磁場來反抗增加，所以感應電流為逆時針或順時針需依題圖位置判定；官方答案為 A，表示題圖配置下為順時針。受力方面，靠近導線的一側與長直導線作用較強，合力指向導線，也就是向左，D 對。", "check": "先判斷線圈所在區域的原磁場方向，再用『反抗磁通變化』決定感應電流。", "images": ["assets/q17_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 18, "type": "多選", "topic": "陰極射線與電子發現", "answer": "CD", "concept": "電子是普遍存在的基本粒子，關鍵證據是荷質比固定且與材料無關，並與其他現象中的粒子一致。", "explanation": "氣體發光或螢光只能說明有射線/激發現象，不足以證明粒子普遍存在於所有原子。若陰極射線粒子的荷質比固定，且與管內氣體、陰極材料無關，代表它不是特定材料的產物，C 對。若其性質與光電效應中的帶電粒子相同，也支持它是共同基本粒子，D 對。能產生電流只說明帶電，不能證明普遍性。", "check": "題目問『普遍存在』，要找與材料無關、跨實驗一致的證據。", "images": ["assets/q18_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 19, "type": "非選", "topic": "煞車、動摩擦與停止距離", "answer": "1.6 m", "concept": "鎖死後輪胎與地面動摩擦，減速度 a=μ_k g。", "explanation": "鎖死代表輪胎在地面上滑動，制動力為地面動摩擦 f=μkt mg=0.50×100×10=500 N，減速度 a=f/m=5 m/s²。用 0=v0²−2aS，S=v0²/(2a)=4.0²/(2×5)=1.6 m。也可用功能定理：初動能 1/2mv² 被摩擦力做功 fS 消耗。", "check": "『車輪鎖死』後看輪胎—地面動摩擦，不看煞車片摩擦。", "images": ["assets/q19_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 20, "type": "非選", "topic": "煞車片摩擦作功", "answer": "10 m", "concept": "未鎖死時題目指定由煞車片與輪胎面的動摩擦作功使車減速。", "explanation": "煞車片對兩輪胎總正向力 N=200 N，煞車片與輪胎面的動摩擦力 f=μkb N=0.40×200=80 N。減速度 a=f/m=80/100=0.8 m/s²。停止距離 S=v0²/(2a)=4.0²/(2×0.8)=10 m。功能定理同樣得到 S=(1/2mv²)/f=800/80=10 m。", "check": "未鎖死、輪胎不在地面滑動；制動能量損耗發生在煞車片—輪胎接觸處。", "images": ["assets/q20_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 21, "type": "非選", "topic": "等電位線實驗設計", "answer": "以一探針固定、另一探針找零電流/零電壓點；圖 9 實線為等電位線。", "concept": "等電位點之間電位差為 0；電場線與等電位線垂直。", "explanation": "做法可用檢流計/微安培計：P1 接觸碳板某點，P2 在附近尋找儀表讀值為 0 A 的點，累積同電位點形成等電位線。也可用伏特計找 0 V 或固定電壓值的點。圖 9 中電力線由正極出發至負極，會與電荷位置相關；等電位線不相交且處處垂直電場線，因此實線為等電位線，虛線為電力線。", "check": "等電位線的操作判準就是『兩點間電位差固定，常用 0 V』。", "images": ["assets/q21_1.jpg", "assets/q21_2.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 22, "type": "非選", "topic": "電場方向與場強比較", "answer": "C、D 點電場沿電力線切線方向；E 點電場量值 > F 點。", "concept": "電場方向為電力線切線方向；電力線越密，電場越強。", "explanation": "在圖 9 上，C、D 點的電場方向要沿虛線電力線的切線並由正極指向負極。比較 E、F 場強時，看電力線密度或等電位線間距：E 附近電力線較密、等電位線間距較小，也較靠近電極，所以 E 點電場量值大於 F 點。", "check": "場強比較不要看點標籤遠近主觀判斷；看線密度或等位線間距。", "images": ["assets/q22_1.jpg", "assets/q22_2.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 23, "type": "多選", "topic": "等電位線與電力線判讀", "answer": "AD", "concept": "實驗上通常先量等電位線，再依垂直關係畫電力線；對稱軸可為零電位線。", "explanation": "等電位線可由測量電位差取得，再依電力線垂直等電位線畫出電場線，A 對。碳板上電流方向沿電場方向，不是沿等電位線，B 錯。電力線從正電極出發、到負電極終止，會通過 A、B 接觸點附近，C 不當。若兩電極對稱且原點 O 設為零，Y 軸為中垂對稱線，任一點電位為零，D 對。換成金屬導體會使整片近似等電位，不能維持同樣電場分布，E 錯。", "check": "電流/電場方向與等電位線垂直，不是沿著等電位線。", "images": ["assets/q23_1.jpg", "assets/q23_2.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 24, "type": "多選", "topic": "光進入介質的波長、頻率與速率", "answer": "AE", "concept": "光進入水中頻率不變，速率變慢，波長變短。", "explanation": "同一束光從空氣進入水中，頻率由光源決定而保持不變，所以單光子能量 E=hf 不變。水中折射率大於 1，傳遞速率 v=c/n 變慢；由 v=fλ，頻率不變且速率變慢，所以波長變短。強度可能因吸收衰減，不會因進水而增大。因此 A、E 正確。", "check": "折射進介質：頻率不變，是判斷波長與速率的核心。", "images": ["assets/q24_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 25, "type": "單選", "topic": "水的吸收光譜與曝光波長", "answer": "A", "concept": "衰減係數越大，光在水中吸收越強，越不適合浸潤式曝光。", "explanation": "從圖 10 的水吸收光譜判讀，EUV 13.5 nm 對應水中衰減極大，穿透距離非常短，因此最不適合在晶圓與光源間注入純水使用。193 nm、248 nm、365 nm、436 nm 相對位於可用或較低吸收區，故選 A。", "check": "看吸收光譜時，縱軸是對數；差一格可能就是 10 倍。", "images": ["assets/q25_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}, {"id": 26, "type": "非選", "topic": "指數衰減與對數圖判讀", "answer": "200 nm < λ < 900 nm（官方寫 200 nm ≤ λ ≤ 900 nm）", "concept": "I=I0 e^{-αz}；若 z=0.10 m 後至少剩 0.37I0，則 α≤10 m^{-1}。", "explanation": "題給 I=I0e^{-αz}，z=10 cm=0.10 m，要求 I≥0.37I0≈e^{-1}I0。因此 e^{-α(0.10)}≥e^{-1}，得到 α(0.10)≤1，也就是 α≤10 m^{-1}。到圖 10 找衰減係數 α=10 m^{-1} 與曲線的兩個交點，讀得約 λL=200 nm、λH=900 nm，所以可行波長範圍約 200 nm 到 900 nm。", "check": "先把 10 cm 換成 0.10 m；再把 0.37 看成 e^{-1}。", "images": ["assets/q26_1.jpg"], "source": "大考中心 114學年度分科測驗物理考科"}];
const KEY='dsat114physicsProgress.v1';
let state=JSON.parse(localStorage.getItem(KEY)||'{}');
let filter='all';
function save(){localStorage.setItem(KEY,JSON.stringify(state));renderStats();renderJump();}
function rec(id){return state[id]||(state[id]={attempts:0,correct:0,wrong:false,last:null});}
function mark(id, ok){const r=rec(id);r.attempts++;r.last=ok?'correct':'wrong';if(ok){r.correct++;r.wrong=false}else{r.wrong=true}save();render();}
function toggleAnswer(id){document.querySelector('#ans'+id).classList.toggle('show')}
function match(q){const r=state[q.id]||{};const tf=document.querySelector('#typeFilter').value;if(tf!=='all'&&q.type!==tf)return false;if(filter==='wrong')return !!r.wrong;if(filter==='todo')return !r.attempts;return true;}
function renderStats(){let done=0,wrong=0,correct=0,attempts=0;QUESTIONS.forEach(q=>{const r=state[q.id]||{};if(r.attempts)done++;if(r.wrong)wrong++;correct+=r.correct||0;attempts+=r.attempts||0;});doneN.textContent=done;wrongN.textContent=wrong;rateN.textContent=attempts?Math.round(correct/attempts*100)+'%':'0%';}
function renderJump(){jump.innerHTML=QUESTIONS.map(q=>{const r=state[q.id]||{};let c=r.wrong?'wrong':(r.attempts?'done':'');return `<a class="${c}" href="#q${q.id}">${q.id}</a>`}).join('')}
function render(){const list=QUESTIONS.filter(match);filterInfo.textContent=`目前顯示 ${list.length} / ${QUESTIONS.length} 題`;app.innerHTML=list.map(q=>{const r=state[q.id]||{};return `<section class="qcard" id="q${q.id}"><div class="qhead"><div><div class="qid">第 ${q.id} 題</div><span class="pill">${q.type}</span><span class="pill">${q.topic}</span><span class="pill">練習 ${r.attempts||0} 次</span>${r.wrong?'<span class="pill" style="color:var(--bad);border-color:var(--bad)">錯題</span>':''}</div><button onclick="toggleAnswer(${q.id})">顯示/隱藏答案</button></div><div class="concept"><b>核心概念：</b>${q.concept}</div>${q.images.map(src=>`<img class="source-img" src="${src}" alt="第${q.id}題原題截圖">`).join('')}<div class="actions"><button class="good" onclick="mark(${q.id},true)">我答對了</button><button class="bad" onclick="mark(${q.id},false)">加入錯題</button><button onclick="const r=rec(${q.id});r.wrong=false;save();render();">移出錯題</button></div><div class="answer" id="ans${q.id}"><div class="ans">答案：${q.answer}</div><p class="explain">${q.explanation}</p><details><summary>短檢核</summary><p>${q.check}</p></details><p class="small">來源：${q.source}</p></div></section>`}).join('')||'<div class="qcard">目前沒有符合條件的題目。</div>'}
document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active','primary'));b.classList.add('active','primary');filter=b.dataset.filter;render();}));
typeFilter.addEventListener('change',render);resetBtn.addEventListener('click',()=>{if(confirm('確定清除這台裝置上的練習紀錄？')){state={};save();render();}});
renderStats();renderJump();render();
</script></body></html>
